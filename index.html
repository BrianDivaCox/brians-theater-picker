<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brian's Theater - Live Movie Picker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }
        h1 { color: #e50914; margin-bottom: 30px; }
        .controls {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }
        select, button {
            padding: 10px 15px; margin: 0 10px; font-size: 16px;
            border-radius: 5px; border: 1px solid #333;
            background-color: #2b2b2b; color: white;
        }
        button {
            background-color: #e50914; border: none;
            cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        button:hover { background-color: #f40612; }
        #result-container {
            width: 100%; max-width: 600px; background-color: #1e1e1e;
            padding: 30px; border-radius: 8px; display: none;
            white-space: pre-wrap;
            font-size: 16px; line-height: 1.6;
        }
        .loading { color: #aaaaaa; font-style: italic; }
        a { color: #4da6ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <h1>Brian's Theater: Live Picker</h1>

    <div class="controls">
        <select id="genre-select">
            <option value="28">Action</option>
            <option value="878">Sci-Fi</option>
            <option value="35">Comedy</option>
            <option value="27">Horror</option>
            <option value="10751">Family</option>
            <option value="16">Animation</option>
            <option value="18">Drama</option>
        </select>

        <select id="year-select">
            </select>

        <button onclick="fetchRandomMovie()">Find Next Movie</button>
    </div>

    <div id="result-container"></div>

    <script>
        // REPLACE THIS WITH YOUR ACTUAL TMDB API KEY
        const API_KEY = 'ab209bae2d49ee12d5a1f8601c11ef6a'; 

        // Auto-generate years from current year down to 1978
        window.onload = function() {
            const yearSelect = document.getElementById("year-select");
            const currentYear = new Date().getFullYear();
            
            for (let y = currentYear; y >= 1978; y--) {
                let option = document.createElement("option");
                option.value = y;
                option.text = y;
                yearSelect.appendChild(option);
            }
        };

        async function fetchRandomMovie() {
            const genreId = document.getElementById("genre-select").value;
            const year = document.getElementById("year-select").value;
            const resultDiv = document.getElementById("result-container");
            
            if (API_KEY === 'YOUR_API_KEY_HERE') {
                alert("Please add your TMDB API key to the code first!");
                return;
            }

            resultDiv.style.display = "block";
            resultDiv.innerHTML = '<span class="loading">Searching the database...</span>';

            try {
                // Build the search URL dynamically
                const searchUrl = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${genreId}&primary_release_year=${year}&language=en-US&page=1`;
                const searchResponse = await fetch(searchUrl);
                const searchData = await searchResponse.json();

                if (!searchData.results || searchData.results.length === 0) {
                    resultDiv.innerHTML = "No movies found for that combination.";
                    return;
                }

                const randomMovie = searchData.results[Math.floor(Math.random() * searchData.results.length)];

                const detailsUrl = `https://api.themoviedb.org/3/movie/${randomMovie.id}?api_key=${API_KEY}&append_to_response=release_dates,videos,watch/providers`;
                const detailsResponse = await fetch(detailsUrl);
                const movie = await detailsResponse.json();
                
                let runtimeStr = "Unknown";
                if (movie.runtime) {
                    const hours = Math.floor(movie.runtime / 60);
                    const mins = movie.runtime % 60;
                    runtimeStr = `${hours} hour${hours !== 1 ? 's' : ''} and ${mins} mins`;
                }

                let rating = "Not Rated";
                if (movie.release_dates && movie.release_dates.results) {
                    const usRelease = movie.release_dates.results.find(r => r.iso_3166_1 === 'US');
                    if (usRelease && usRelease.release_dates[0].certification) {
                        rating = usRelease.release_dates[0].certification || "Not Rated";
                    }
                }

                const genresStr = movie.genres.map(g => g.name).join(", ");

                let source = "VOD / Rent";
                if (movie['watch/providers'] && movie['watch/providers'].results && movie['watch/providers'].results.US) {
                    const usProviders = movie['watch/providers'].results.US;
                    if (usProviders.flatrate) {
                        source = usProviders.flatrate[0].provider_name;
                    }
                }

                let trailerLink = "No trailer available";
                if (movie.videos && movie.videos.results) {
                    const trailer = movie.videos.results.find(v => v.type === "Trailer" && v.site === "YouTube");
                    if (trailer) {
                        trailerLink = `https://www.youtube.com/watch?v=${trailer.key}`;
                    }
                }

                // Outputs precisely in your requested layout
                resultDiv.innerHTML = `Movie: ${movie.title}\nYear: ${movie.release_date.split('-')[0]}\nRating: ${rating}\nRuntime: ${runtimeStr}\nGenres: ${genresStr}\nSource: ${source}\n\nSummary: ${movie.overview}\n\nTrailer: <a href="${trailerLink}" target="_blank">${trailerLink}</a>`;

            } catch (error) {
                resultDiv.innerHTML = "An error occurred while fetching data. Check your API key or internet connection.";
                console.error(error);
            }
        }
    </script>
</body>
</html>
